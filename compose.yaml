# Local Kafka for Collector API. Spring Boot Docker Compose attaches on startup when optional compose is enabled.
#
# Note: docker.io/bitnami/kafka tags such as 3.7.2 often no longer resolve publicly; use bitnamilegacy/kafka
# (Bitnami legacy catalog). See https://hub.docker.com/r/bitnamilegacy/kafka
#
# Listeners: PLAINTEXT on 9092 for the host (Spring on localhost). INTERNAL on 29092 for other containers
# (Kafka UI). If Kafka only advertised localhost:9092, UI would get bad metadata (localhost = itself).
# TODO: tighten advertised listeners for non-local deployments.
services:
  kafka:
    image: docker.io/bitnamilegacy/kafka:3.7.1-debian-12-r9
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,INTERNAL://kafka:29092"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - behavr_kafka_data:/bitnami/kafka

  kafka-ui:
    image: docker.io/provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: behavr-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

volumes:
  behavr_kafka_data:
